<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script src="assets/fileParse.js"></script>
    <script src="https://cdn.bootcss.com/FileSaver.js/1.3.8/FileSaver.js"></script>
</head>

<body>
    <div>
        <input type="file" id="files" style="display: none" onchange="readFile();">
        <input type="button" id="fileImport" value="导入">
        <input type="button" id="fileSave" value="保存" style="align-items: center;">
    </div>
    <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
    <script>
        //点击导入按钮,使files触发点击事件,然后完成读取文件的操作
        $("#fileImport").click(function(e) {
            $("#files").click();
            $("#files").val("");
            e.preventDefault();
        });
        $("#fileSave").click(function(e) {
            var data = {
                12: "123",
                1: "asd",
            }
            downFile1(data);
            downFile2(data, '123.json');
            e.preventDefault();
        });
    </script>
</body>

</html>
