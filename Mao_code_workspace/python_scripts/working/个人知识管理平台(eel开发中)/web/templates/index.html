    <style type="text/css">
        .custom-input {
            position: relative;
            padding-top: 5px;
            margin-bottom: 0px;
            max-width: 800px;
            align-items: center;
        }

        .custom-input input {
            padding-left: 55px;
            font-family: "Comic Sans MS";
            font-size: 22px;
            font-weight: bold;
        }

        .custom-input:-webkit-autofill {
            box-shadow: 0 0 0px 1000px #FFF inset !important;
        }

        .custom-input label {
            cursor: text;
            margin: 0;
            padding: 0;
            left: 15px;
            top: 27px;
            position: absolute;
            font-size: 14px;
            color: #b517d9;
            font-weight: normal;
            transition: all .3s ease;
        }

        .custom-input label.active {
            top: 0;
            left: 0;
            font-size: 12px;
        }

        .custom-input label.active.focusIn {
            color: #e70f7f;
        }
    </style>
</head>
<body>
<div id="content">
    <div>


        <script id="data-tpl" type="text/html">
            <h1>{{title}}</h1>
            <ul>
                    {{each list value i}}
                <li>索引 {{i + 1}} ：{{value}}</li>
                    {{/each}}
            </ul>
        </script>
        <script>
            var data={};
            async function getFilesByPy() {
                data = await eel.get_data()();
                console.log("从python文件中获取文件树")
                // console.log(data);
                var html = template('data-tpl', data);
                document.getElementById('content').innerHTML = html;
            };
            getFilesByPy();
        </script>
</body>
</html>
