<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title></title>
    <link href="../../assets/plugins/bootstrap/css/bootstrap.min.css" rel="stylesheet" media="screen">
    <link href="../../assets/plugins/bootstrap/css/bootstrap-datetimepicker.min.css" rel="stylesheet" media="screen">
    <script type="text/javascript" src="../../assets/plugins/jquery/jquery-3.1.0.min.js" charset="UTF-8"></script>
    <script type="text/javascript" src="../../assets/plugins/bootstrap/js/bootstrap.min.js"></script>
    <script src="../../assets/plugins/bootstrap/js/moment.min.js"></script>
    <script type="text/javascript" src="../../assets/plugins/bootstrap/js/bootstrap-datetimepicker.js" charset="UTF-8"></script>
    <script src="../../assets/plugins/bootstrap/js/locales/bootstrap-datetimepicker.zh-CN.js"></script>
</head>

<body>

<div class="row">
    <div class='col-sm-6'>
        <div class="input-append date" id="datetimepicker" data-date="12-02-2012" data-date-format="dd-mm-yyyy">
            <input class="span2" size="16" type="text" value="12-02-2012">
            <span class="add-on"><i class="icon-th"></i></span>
        </div>
        <div class="form-group">
            <label>选择日期：</label>
            <!--指定 date标记-->
            <div class='input-group date' id='datetimepicker1'>
                <input type='text' class="form-control" />
                <span class="input-group-addon">
                    <span class="glyphicon glyphicon-calendar"></span>
                </span>
            </div>
        </div>
    </div>
    <div class='col-sm-6'>
        <div class="form-group">
            <label>选择日期+时间：</label>
            <!--指定 date标记-->
            <div class='input-group date' id='datetimepicker2'>
                <input type='text' class="form-control" />
                <span class="input-group-addon">
                    <span class="glyphicon glyphicon-calendar"></span>
                </span>
            </div>
        </div>
    </div>
</div>
  <script>
        $(function () {
            $('#datetimepicker').datetimepicker({
                pickerPosition:'bottom-left',
                format: "yyyy-mm-dd hh:ii:ss",
                locale: moment.locale('zh-cn'),
                forceParse: 0,//设置为0，时间不会跳转1899，会显示当前时间。
                language: 'zh-CN',//显示中文
                startView:2,
                maxView: 4,
                weekStart: 1,
                viewSelect:'hour',
                showMeridian: 1,
                initialDate: new Date(),//初始化当前日期
                autoclose: 1,//选中自动关闭
                todayBtn: 1,//显示今日按钮
                todayHighlight: 1,
                minuteStep:10,//分钟jian'ge
            });
            $('#datetimepicker1').datetimepicker({
                pickerPosition:'bottom-left',
                format: "yyyy-mm-dd hh:ii:ss",
                // locale: moment.locale('zh-cn'),
                forceParse: 0,//设置为0，时间不会跳转1899，会显示当前时间。
                language: 'zh-CN',//显示中文
                startView:2,
                maxView: 4,
                weekStart: 1,
                viewSelect:'hour',
                showMeridian: 1,
                initialDate: new Date(),//初始化当前日期
                autoclose: 1,//选中自动关闭
                todayBtn: 1,//显示今日按钮
                todayHighlight: 1,
                minuteStep:10,//分钟jian'ge
            });
            $('#datetimepicker2').datetimepicker({
                format: "yyyy-mm-dd hh:ii:ss",
                locale: moment.locale('zh-cn')
            });
            $("#datetimepicker").datetimepicker("setDate", new Date() );  //设置显示默认当天的时间
            $("#datetimepicker1").datetimepicker("setDate", new Date() );  //设置显示默认当天的时间
            $("#datetimepicker2").datetimepicker("setDate", new Date() );  //设置显示默认当天的时间
        });


    </script>

</body>
</html>
